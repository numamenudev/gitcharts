<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Git Code Archaeology Charts</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container my-5">
        <header class="border-bottom pb-3 mb-4">
            <h1 class="h3">Git Code Archaeology Charts</h1>
            <p class="text-muted mb-0">Visualizing how code ages over time</p>
        </header>

        <main>
            <div class="row g-3 mb-4 align-items-center">
                <div class="col-auto">
                    <label for="repo-select" class="col-form-label">Repository:</label>
                </div>
                <div class="col-auto">
                    <select id="repo-select" name="repository" class="form-select">
                        <!-- Populated by JavaScript -->
                    </select>
                </div>
                <div class="col-auto">
                    <label for="granularity-select" class="col-form-label">Granularity:</label>
                </div>
                <div class="col-auto">
                    <select id="granularity-select" class="form-select">
                        <option value="Day">Day</option>
                        <option value="Week" selected>Week</option>
                        <option value="Month">Month</option>
                        <option value="Quarter">Quarter</option>
                        <option value="Year">Year</option>
                    </select>
                </div>
                <div class="col-auto" id="version-toggle" style="display: none;">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="show-versions">
                        <label class="form-check-label" for="show-versions">Show versions</label>
                    </div>
                </div>
                <div class="col-auto">
                    <div class="form-check">
                        <input type="checkbox" class="form-check-input" id="invert-layers" autocomplete="off">
                        <label class="form-check-label" for="invert-layers">Invert layers</label>
                    </div>
                </div>
                <div class="col-auto ms-auto">
                    <button id="regenerate-btn" class="btn btn-primary btn-sm">
                        Regenerate
                    </button>
                    <span id="regenerate-status" class="ms-2 text-muted small"></span>
                </div>
            </div>

            <div id="chart-container" class="border rounded p-3 bg-white" role="main" aria-live="polite">
                <!-- Chart will be rendered here by JavaScript -->
            </div>
        </main>

        <footer class="border-top pt-3 mt-4 text-muted small d-flex justify-content-between align-items-center">
            <p class="mb-0">
                Charts generated by
                <a href="https://github.com/koaning/gitcharts" target="_blank" rel="noopener">git_archaeology.py</a>
                | Showing stacked area charts of code age distribution over repository history
            </p>
            <button id="settings-btn" class="btn btn-outline-secondary btn-sm">Settings</button>
        </footer>

    <!-- Settings Modal -->
    <div class="modal fade" id="settings-modal" tabindex="-1">
      <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Repository Configuration</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <div id="config-editor"></div>
            <button id="add-repo-btn" class="btn btn-outline-success btn-sm mt-3">+ Add repository</button>
          </div>
          <div class="modal-footer">
            <span id="config-status" class="text-muted small me-auto"></span>
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button id="save-config-btn" class="btn btn-primary">Save</button>
          </div>
        </div>
      </div>
    </div>
    </div>

    <!-- Vega Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/vega@5"></script>
    <script src="https://cdn.jsdelivr.net/npm/vega-lite@5"></script>
    <script src="https://cdn.jsdelivr.net/npm/vega-embed@6"></script>

    <!-- Bootstrap JS (for modal) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Application Scripts -->
    <script type="module" src="js/app.js"></script>
</body>
</html>
